<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta
            name="viewport"
            content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>Search Videos</title>
    <link rel="stylesheet" href="/styles/cssReset.css"/>
    <link rel="stylesheet" href="/styles/searchModule.css"/>
    <link rel="stylesheet" href="/styles/videoCard.css"/>
    <script src="../script/utils/LogoutButton.js" defer></script>
    <script src="../script/auth.js" defer></script>
    <script src="../script/search-script.js" type="module" defer></script>
</head>
<body class="search-page">
<div class="search-shell">
    <div class="search-header">
        <div>
            <p class="search-kicker">Video discovery</p>
            <h1>Search Videos</h1>
        </div>
        <div class="search-nav">
            <a href="search.html" class="active">Search</a>
            <a href="rss_export.html">RSS</a>
            <a href="friend.html">Friends</a>
            <a href="#" id="logout" class="btn">Logout</a>
        </div>
    </div>

    <div class="search-panel">
        <form id="search-form" class="search-form">
            <div class="search-main-field">
                <label for="search-bar">Search</label>
                <div class="search-input-row">
                    <input
                            type="search"
                            id="search-bar"
                            placeholder="Search videos..."
                    />
                    <button type="submit" class="search-btn">Search</button>
                </div>
            </div>

            <div class="filters-grid">
                <div class="filter-field">
                    <label for="video-duration">Duration</label>
                    <select name="video-duration-select" id="video-duration">
                        <option value="any">Any duration</option>
                        <option value="short">Less than 4 minutes</option>
                        <option value="medium">Between 4 and 20 minutes</option>
                        <option value="long">Over 20 minutes</option>
                    </select>
                </div>

                <div class="filter-field">
                    <label for="language-select">Language</label>
                    <select name="language-select" id="language-select">
                        <option value="">Any language</option>
                        <option value="ro">Romanian</option>
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                    </select>
                </div>

                <div class="filter-field">
                    <label for="order-select">Order by</label>
                    <select name="order-select" id="order-select">
                        <option value="relevance">Relevance</option>
                        <option value="date">Date</option>
                        <option value="rating">Rating</option>
                        <option value="title">Title</option>
                        <option value="videoCount">Video Count</option>
                        <option value="viewCount">View Count</option>
                    </select>
                </div>

                <div class="filter-field">
                    <label for="after-time">After</label>
                    <input type="date" name="after-time" id="after-time"/>
                </div>

                <div class="filter-field">
                    <label for="before-time">Before</label>
                    <input type="date" name="before-time" id="before-time"/>
                </div>
            </div>

            <p id="search-status" class="search-status"></p>
        </form>
    </div>

    <div class="results-section">
        <div class="results-heading">
            <h2>Results</h2>
        </div>
        <div class="result" id="results"></div>
    </div>
</div>
</body>
</html>
