<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Requests</title>
    <link rel="stylesheet" href="../styles/cssReset.css">
    <link rel="stylesheet" href="../styles/friendsModule.css">
    <script src="../script/utils/LogoutButton.js" defer></script>
    <script src="../script/friend-requests-script.js" defer></script>
    <script src="../script/auth.js" defer></script>
</head>
<body class="friends-body">
<div class="friends-shell">
    <div class="friends-header">
        <div>
            <p class="friends-kicker">Friends</p>
            <h1>Friend Requests</h1>
        </div>
        <p class="friends-user-chip">
            <span>Current user ID</span>
            <span id="current-user-id"></span>
        </p>
    </div>

    <div class="friends-nav">
        <a href="friend.html">Add</a>
        <a href="friend_requests.html" class="active">Requests</a>
        <a href="friends.html">Friends</a>
    </div>

    <div class="friends-grid">
        <div class="friends-panel">
            <div class="friends-panel-header">
                <h2>Requests</h2>
            </div>

            <form id="load-requests-form" class="friends-form">
                <div class="friends-field">
                    <label for="request-type">Type</label>
                    <select id="request-type" name="type">
                        <option value="incoming">Incoming</option>
                        <option value="outgoing">Outgoing</option>
                        <option value="all">All</option>
                    </select>
                </div>

                <div class="friends-actions">
                    <button type="submit" class="btn primary">Load Requests</button>
                </div>

                <p id="status" class="status-line"></p>
            </form>

            <ul id="requests-list" class="friends-list"></ul>
        </div>
    </div>
    <div class="logout-row">
        <button id="logout" class="btn">Logout</button>
        <a href="recommendations.html" class="btn">Recommendations</a>
        <a href="search.html" class="btn">Search</a>
        <a href="rss_export.html" class="btn">RSS</a>
        <a href="account.html" class="btn">Account</a>
    </div>
</div>
</body>
</html>
