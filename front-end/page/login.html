<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Log In</title>
    <link rel="stylesheet" href="/styles/cssReset.css" />
    <link rel="stylesheet" href="/styles/loginModule.css" />
    <script src="../script/login-script.js" defer></script>
  </head>
  <body>
    <div class="login-container">
      <form method="post">
        <label>
          Username:
          <input
            type="text"
            id="username"
            name="usernameP"
            placeholder="Username"
            maxlength="30"
            required
          />
        </label>
        <label>
          Password:
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
          />
        </label>
        <button type="button" id="login-submit">Login</button>
      </form>
    </div>
  </body>
</html>
