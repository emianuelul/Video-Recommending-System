<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Register</title>
    <link rel="stylesheet" href="../styles/cssReset.css">
    <link rel="stylesheet" href="../styles/registerModule.css">
    <script src="./register-script.js" defer></script>
</head>

<body>
<div class="register-container">
    <form method="post">
        <input type="text" id="username" name="username" placeholder="Username" maxlength="30" required/>
        <input type="text" id="password" name="password" placeholder="Password" required/>
        <button type="button" id="register-submit">Register</button>
    </form>
</div>
</body>
</html>
