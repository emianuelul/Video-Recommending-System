<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/cssReset.css">
    <script src="search-script.js" defer></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            gap: 1rem;

            padding: 1.5rem;
        }

        .search-container {
            display: flex;
            gap: 1rem;
        }

        .date-container {
            display: flex;
            gap: 1.5rem;
        }

        .optional {
            position: relative;
        }

        .optional::before {
            position: absolute;
            content: '( optional )';
            color: dimgrey;

            right: -10ch;

        }
    </style>
</head>
<body>
<div class="container">
    <div class="search-container">
        <label>
            Search
            <input type="search" name="" id="search-bar" placeholder="Search...">
        </label>
    </div>
    <div class="duration-container optional">
        <label for="video-duration">
            Duration:
            <select name="video-duration-select" id="video-duration">
                <option value="any">Choose a duration</option>
                <option value="short">Less than 4 minutes</option>
                <option value="medium">Between 4 and 20 minutes</option>
                <option value="long">Over 20 minutes</option>
            </select>
        </label>
    </div>
    <div class="date-container optional">
        <div class="after">
            <label for="after-time">
                After:
                <input type="date" name="after-time" id="after-time">
            </label>
        </div>

        <div class="before">
            <label for="before-time">
                Before:
                <input type="date" name="before-time" id="before-time">
            </label>
        </div>
    </div>
    <div class="language-container optional">
        <label for="language-select">
            Language:
            <select name="language-select" id="language-select">
                <option value="">Choose content language</option>
                <option value="ro">Romanian</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="de">German</option>
            </select>
        </label>
    </div>
    <div class="order-container optional">
        <label for="order-select">
            Order by:
            <select name="order-select" id="order-select">
                <option value="relevance">Select order</option>
                <option value="date">Date</option>
                <option value="rating">Rating</option>
                <option value="relevance">Relevance</option>
                <option value="title">Title</option>
                <option value="videoCount">Video Count</option>
                <option value="viewCount">View Count</option>
            </select>
        </label>
    </div>
    <button type="button" class="search-btn">Search</button>
</div>
<div class="result">

</div>
</body>
</html>
